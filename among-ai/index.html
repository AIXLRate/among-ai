<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AMONG·AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Righteous&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{min-height:100vh;background:#080B14;color:#fff;font-family:'Nunito',sans-serif;display:flex;flex-direction:column;overflow-x:hidden}
  ::-webkit-scrollbar{width:4px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px}

  @keyframes amBounce{from{transform:translateY(0)}to{transform:translateY(-11px)}}
  @keyframes amBlink{from{opacity:1}to{opacity:0.15}}
  @keyframes amPulse{0%,100%{opacity:.28}50%{opacity:.9}}
  @keyframes amTwinkle{0%,100%{opacity:.15}50%{opacity:.85}}
  @keyframes amSlide{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  @keyframes amFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
  @keyframes scoreGrow{from{width:0}to{width:var(--w)}}

  /* Header */
  header{position:sticky;top:0;z-index:20;padding:10px 20px;background:rgba(8,11,20,0.94);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,0.05);display:flex;align-items:center;gap:14px}
  .header-models{margin-left:auto;display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end}
  .model-badge{font-size:8px;padding:2px 9px;border-radius:99px;font-weight:700;letter-spacing:1px}

  /* Stars */
  #starfield{position:fixed;inset:0;pointer-events:none;z-index:0}
  .star{position:absolute;border-radius:50%;background:white}

  /* Main */
  main{flex:1;overflow-y:auto;padding:24px 20px 8px;position:relative;z-index:1}
  .inner{max-width:740px;margin:0 auto}

  /* Empty state */
  #empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:70vh;gap:28px;text-align:center}
  .empty-crew{display:flex;gap:12px}
  .empty-title{font-family:'Righteous',cursive;font-size:38px;letter-spacing:5px;line-height:1;margin-bottom:8px}
  .empty-sub{color:rgba(255,255,255,0.35);font-size:13px;line-height:1.8;max-width:320px}
  .suggestions{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
  .suggestion-btn{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.09);border-radius:10px;padding:8px 14px;color:rgba(255,255,255,0.5);cursor:pointer;font-size:12px;font-family:'Nunito',sans-serif;transition:all .2s}
  .suggestion-btn:hover{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.8)}

  /* Messages */
  #messages{display:flex;flex-direction:column;gap:22px;padding-bottom:24px}

  /* User message */
  .user-msg{display:flex;justify-content:flex-end;animation:amSlide .3s ease}
  .user-bubble{background:rgba(197,255,42,0.08);border:1px solid rgba(197,255,42,0.18);border-radius:18px 18px 4px 18px;padding:12px 18px;max-width:72%;font-size:15px;line-height:1.65;color:rgba(255,255,255,0.92)}

  /* Loading */
  .loading-wrap{padding:28px 0 16px;display:flex;flex-direction:column;align-items:center;gap:20px}
  .loading-crew{display:flex;gap:18px;align-items:flex-end}
  .loading-label{color:rgba(255,255,255,0.35);font-size:10px;letter-spacing:3px;animation:amPulse 1.8s ease-in-out infinite}

  /* AI response */
  .ai-wrap{display:flex;flex-direction:column;gap:12px;animation:amSlide .4s ease}
  .divider{display:flex;align-items:center;gap:10px;color:rgba(255,255,255,0.22);font-size:9px;letter-spacing:2.5px}
  .divider-line{flex:1;height:1px;background:rgba(255,255,255,0.06)}

  .winner-card{border-radius:18px;padding:22px 20px 18px;position:relative}
  .best-badge{position:absolute;top:-13px;left:18px;padding:3px 14px;border-radius:99px;font-size:9px;font-weight:800;letter-spacing:2px;font-family:'Righteous',cursive;color:#080B14}
  .winner-header{display:flex;align-items:flex-start;gap:14px;margin-bottom:16px}
  .winner-info{flex:1;padding-top:2px}
  .model-name{font-weight:700;font-size:14px;letter-spacing:1.5px;margin-bottom:2px}
  .model-role{color:rgba(255,255,255,0.3);font-size:11px;margin-bottom:8px}
  .answer-text{color:rgba(255,255,255,0.88);font-size:14.5px;line-height:1.78;white-space:pre-wrap;word-break:break-word}
  .judge-reason{margin-top:14px;padding-top:12px;color:rgba(255,255,255,0.3);font-size:11px;font-style:italic;letter-spacing:0.3px}

  .score-bar-wrap{display:flex;align-items:center;gap:7px}
  .score-track{flex:1;height:3px;background:rgba(255,255,255,0.08);border-radius:99px;overflow:hidden}
  .score-fill{height:100%;transition:width 1.3s cubic-bezier(0.4,0,0.2,1)}
  .score-num{font-size:10px;color:rgba(255,255,255,0.4);font-family:monospace;min-width:26px;text-align:right}

  .toggle-btn{background:none;border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:10px 16px;color:rgba(255,255,255,0.38);cursor:pointer;font-size:10px;letter-spacing:1.8px;transition:all .2s;width:100%;font-family:'Nunito',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px}
  .toggle-btn:hover{background:rgba(255,255,255,0.04)}

  .others-wrap{display:flex;flex-direction:column;gap:10px}
  .other-card{border-radius:14px;padding:14px 16px;animation:amSlide .3s ease}
  .other-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .other-answer{color:rgba(255,255,255,0.6);font-size:13px;line-height:1.72;white-space:pre-wrap;word-break:break-word}

  /* Debate specific styles */
  .debate-round{margin-bottom:20px;padding:20px;border-radius:16px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.08)}
  .debate-title{color:rgba(255,255,255,0.5);font-size:11px;letter-spacing:2px;text-align:center;margin-bottom:16px;text-transform:uppercase}
  .debate-message{margin-bottom:16px;padding:16px;border-radius:12px;background:rgba(0,0,0,0.2);border-left:3px solid transparent}
  .debate-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .debate-name{color:#fff;font-weight:700;font-size:12px;letter-spacing:1px}
  .debate-role{font-size:9px;color:rgba(255,255,255,0.4);text-transform:uppercase}
  .debate-badge{margin-left:auto;font-size:9px;color:rgba(255,255,255,0.5);background:rgba(255,255,255,0.06);padding:3px 10px;border-radius:99px}
  .debate-context{font-size:10px;color:rgba(255,255,255,0.35);margin-bottom:10px;padding:10px;background:rgba(0,0,0,0.3);border-radius:6px;line-height:1.5;border-left:2px solid rgba(255,255,255,0.1)}
  .debate-text{color:rgba(255,255,255,0.85);font-size:13px;line-height:1.75}
  .consensus-card{border:2px solid #C5FF2A;background:linear-gradient(135deg,rgba(197,255,42,0.12) 0%,rgba(197,255,42,0.03) 100%);box-shadow:0 0 40px rgba(197,255,42,0.2)}

  .error-msg{border:1px solid rgba(255,70,85,0.3);border-radius:12px;padding:12px 16px;background:rgba(255,70,85,0.06);color:#FF6B7A;font-size:13px;animation:amSlide .3s ease}

  /* Input */
  .input-area{position:sticky;bottom:0;z-index:20;padding:12px 20px 16px;background:rgba(8,11,20,0.96);backdrop-filter:blur(20px);border-top:1px solid rgba(255,255,255,0.05)}
  .input-inner{max-width:740px;margin:0 auto}
  .input-box{display:flex;gap:8px;align-items:center;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.09);border-radius:16px;padding:4px 4px 4px 16px;transition:border-color .2s}
  .input-box:focus-within{border-color:rgba(255,255,255,0.2)}
  #question-input{flex:1;background:none;border:none;outline:none;color:rgba(255,255,255,0.9);font-size:14.5px;font-family:'Nunito',sans-serif;padding:10px 0}
  #question-input::placeholder{color:rgba(255,255,255,0.3)}
  #send-btn{padding:10px 24px;border-radius:12px;border:none;font-weight:800;font-size:12px;letter-spacing:1.2px;cursor:pointer;transition:all .2s;font-family:'Nunito',sans-serif}
  #send-btn.active{background:#C5FF2A;color:#080B14;box-shadow:0 0 16px rgba(197,255,42,0.3)}
  #send-btn.inactive{background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.22);cursor:default}
  .powered-by{text-align:center;margin-top:8px;font-size:8.5px;color:rgba(255,255,255,0.16);letter-spacing:1.5px}
</style>
</head>
<body>

<!-- Starfield -->
<div id="starfield"></div>

<!-- Header -->
<header>
  <div id="header-crew" style="display:flex;gap:3px"></div>
  <div>
    <div style="font-family:'Righteous',cursive;font-size:17px;letter-spacing:3px;line-height:1.1">
      AMONG<span style="color:#C5FF2A">·AI</span>
    </div>
    <div style="font-size:8px;color:rgba(255,255,255,0.28);letter-spacing:2px">7 CREWMATES · 1 WINNER</div>
  </div>
  <div id="header-badges" class="header-models"></div>
</header>

<!-- Main -->
<main>
  <div class="inner">
    <div id="empty-state">
      <div class="empty-crew" id="empty-crew"></div>
      <div>
        <div class="empty-title">AMONG<span style="color:#C5FF2A">·AI</span></div>
        <div class="empty-sub">Ask anything. All 7 crewmates answer.<br/>The best answer wins the vote.</div>
      </div>
      <div class="suggestions">
        <button class="suggestion-btn" onclick="setSuggestion('What is a black hole?')">What is a black hole?</button>
        <button class="suggestion-btn" onclick="setSuggestion('How does GPS work?')">How does GPS work?</button>
        <button class="suggestion-btn" onclick="setSuggestion('Explain quantum computing')">Explain quantum computing</button>
      </div>
    </div>
    <div id="messages"></div>
  </div>
</main>

<!-- Input -->
<div class="input-area">
  <div class="input-inner">
    <div class="input-box">
      <input id="question-input" placeholder="Ask the crew anything..." autocomplete="off"/>
      <button id="send-btn" class="inactive" onclick="send()">SEND →</button>
    </div>
    <div class="powered-by" id="powered-by"></div>
  </div>
</div>

<script>

const MODELS = [
  {id:"llama-3.3-70b-versatile",                    name:"LLAMA 70B",   role:"The Brain",    color:"#FF4655", dark:"#7A1520", glow:"rgba(255,70,85,0.25)"},
  {id:"llama-3.1-8b-instant",                       name:"LLAMA 8B",    role:"The Quick",    color:"#26D07C", dark:"#0C6035", glow:"rgba(38,208,124,0.25)"},
  {id:"meta-llama/llama-4-scout-17b-16e-instruct",  name:"LLAMA 4 SCOUT", role:"The Scout",  color:"#2E86DE", dark:"#134070", glow:"rgba(46,134,222,0.25)"},
  {id:"qwen/qwen3-32b",                             name:"QWEN 32B",    role:"The Sage",     color:"#00D4FF", dark:"#005A6B", glow:"rgba(0,212,255,0.25)"},
  {id:"openai/gpt-oss-120b",                        name:"GPT-OSS 120", role:"The Titan",    color:"#FFCB2F", dark:"#7A5800", glow:"rgba(255,203,47,0.25)"},
  {id:"openai/gpt-oss-20b",                         name:"GPT-OSS 20",  role:"The Nimble",   color:"#FF8C42", dark:"#7A3A00", glow:"rgba(255,140,66,0.25)"},
  {id:"llama-3.3-70b-versatile",                    name:"LLAMA 70B-2", role:"The Maverick", color:"#A855F7", dark:"#4C1D95", glow:"rgba(168,85,247,0.25)"},
]
// al lo8a yrd b ay lo8a 
function addAIResponse(data){
  const wrap=document.createElement('div')
  wrap.className='ai-wrap'

  // Divider with language indicator
  const langEmoji = {
    'Arabic': '🇸🇦', 'English': '🇬🇧', 'Spanish': '🇪🇸', 'French': '🇫🇷',
    'German': '🇩🇪', 'Italian': '🇮🇹', 'Portuguese': '🇵🇹', 'Russian': '🇷🇺',
    'Chinese': '🇨🇳', 'Japanese': '🇯🇵', 'Korean': '🇰🇷', 'Hindi': '🇮🇳',
    'Turkish': '🇹🇷', 'Polish': '🇵🇱', 'Dutch': '🇳🇱', 'Swedish': '🇸🇪',
    'Persian': '🇮🇷', 'Urdu': '🇵🇰', 'Hebrew': '🇮🇱', 'Thai': '🇹🇭',
    'Vietnamese': '🇻🇳', 'Indonesian': '🇮🇩', 'Malay': '🇲🇾', 'Ukrainian': '🇺🇦',
    'Romanian': '🇷🇴', 'Czech': '🇨🇿', 'Hungarian': '🇭🇺', 'Greek': '🇬🇷',
    'Danish': '🇩🇰', 'Finnish': '🇫🇮', 'Norwegian': '🇳🇴', 'Bulgarian': '🇧🇬',
    'Croatian': '🇭🇷', 'Slovak': '🇸🇰', 'Slovenian': '🇸🇮', 'Lithuanian': '🇱🇹',
    'Latvian': '🇱🇻', 'Estonian': '🇪🇪', 'Serbian': '🇷🇸', 'Albanian': '🇦🇱',
    'Macedonian': '🇲🇰', 'Bosnian': '🇧🇦', 'Georgian': '🇬🇪', 'Armenian': '🇦🇲',
    'Azerbaijani': '🇦🇿', 'Kazakh': '🇰🇿', 'Uzbek': '🇺🇿', 'Turkmen': '🇹🇲',
    'Kyrgyz': '🇰🇬', 'Tajik': '🇹🇯', 'Mongolian': '🇲🇳', 'Nepali': '🇳🇵',
    'Sinhala': '🇱🇰', 'Bengali': '🇧🇩', 'Tamil': '🇮🇳', 'Telugu': '🇮🇳',
    'Marathi': '🇮🇳', 'Kannada': '🇮🇳', 'Gujarati': '🇮🇳', 'Punjabi': '🇮🇳',
    'Malayalam': '🇮🇳', 'Swahili': '🇰🇪', 'Afrikaans': '🇿🇦', 'Zulu': '🇿🇦',
    'Amharic': '🇪🇹', 'Somali': '🇸🇴', 'Hausa': '🇳🇬', 'Yoruba': '🇳🇬',
    'Igbo': '🇳🇬', 'Wolof': '🇸🇳', 'Twi': '🇬🇭', 'Malagasy': '🇲🇬',
  }[data.detected_language] || '🌐'
  
  wrap.innerHTML=`<div class="divider"><div class="divider-line"></div>${langEmoji} ${data.detected_language || 'Auto'} · 🚨 EMERGENCY MEETING CONCLUDED<div class="divider-line"></div></div>`

  // ... rest of your existing addAIResponse code ...
  
  // Update the subtitle to show language
  const finalCard = wrap.querySelector('.winner-card')
  if(finalCard){
    const roleDiv = finalCard.querySelector('.model-role')
    if(roleDiv){
      roleDiv.textContent = `${data.total_rounds} rounds of debate · ${data.detected_language} · Top: ${(data.top_contributors || []).join(', ')}`
    }
  }
}
// ── Crewmate SVG ──
function crewmateSVG(color, dark, size=40) {
  const h = size * 1.5
  return `<svg viewBox="0 0 52 78" width="${size}" height="${h}" style="display:block;flex-shrink:0">
    <rect x="38" y="26" width="13" height="24" rx="5.5" fill="${dark}"/>
    <ellipse cx="22" cy="54" rx="21" ry="23" fill="${color}"/>
    <ellipse cx="22" cy="20" rx="19" ry="20" fill="${color}"/>
    <path d="M6 12 Q22 1 38 12 Q39 31 22 33 Q5 31 6 12Z" fill="#C8EDFF" opacity="0.86"/>
    <path d="M11 13 Q20 6 28 10" stroke="white" stroke-width="2" fill="none" opacity="0.45" stroke-linecap="round"/>
    <rect x="6"  y="71" width="12" height="7" rx="3.5" fill="${dark}"/>
    <rect x="24" y="71" width="12" height="7" rx="3.5" fill="${dark}"/>
  </svg>`
}

// ── Stars ──
const sf = document.getElementById('starfield')
for(let i=0;i<150;i++){
  const s=document.createElement('div')
  s.className='star'
  const x=((i*137.508)%100).toFixed(3)
  const y=((i*89.334)%100).toFixed(3)
  const sz=(0.4+(i%4)*0.45).toFixed(1)
  const delay=((i%8)*0.4).toFixed(1)
  const dur=(2.5+(i%5)*0.6).toFixed(1)
  s.style.cssText=`left:${x}%;top:${y}%;width:${sz}px;height:${sz}px;animation:amTwinkle ${dur}s ease-in-out ${delay}s infinite`
  sf.appendChild(s)
}

// ── Header ──
const hc=document.getElementById('header-crew')
const hb=document.getElementById('header-badges')
MODELS.forEach((m,i)=>{
  const d=document.createElement('div')
  d.style.filter=`drop-shadow(0 0 4px ${m.color}60)`
  d.innerHTML=crewmateSVG(m.color,m.dark,18)
  hc.appendChild(d)
  const b=document.createElement('div')
  b.className='model-badge'
  b.title=m.role
  b.textContent=m.name
  b.style.cssText=`border:1px solid ${m.color}45;color:${m.color}`
  hb.appendChild(b)
})
document.getElementById('powered-by').textContent='POWERED BY GROQ · '+MODELS.map(m=>m.name).join(' · ')

// ── Empty state crew ──
const ec=document.getElementById('empty-crew')
MODELS.forEach((m,i)=>{
  const d=document.createElement('div')
  d.style.cssText=`animation:amFloat ${1.8+i*0.3}s ease-in-out ${i*0.2}s infinite;filter:drop-shadow(0 0 10px ${m.color}60)`
  d.innerHTML=crewmateSVG(m.color,m.dark,52)
  ec.appendChild(d)
})

// ── Score bar ──
function scoreBarHTML(score, color) {
  return `<div class="score-bar-wrap">
    <div class="score-track"><div class="score-fill" data-score="${score}" style="width:0%;background:${color};box-shadow:0 0 8px ${color}"></div></div>
    <span class="score-num">${score}</span>
  </div>`
}

// ── Animate score bars ──
function animateScores() {
  document.querySelectorAll('.score-fill[data-score]').forEach(el=>{
    const s=el.getAttribute('data-score')
    setTimeout(()=>{ el.style.width=s+'%' }, 120)
  })
}

// ── Input ──
const input=document.getElementById('question-input')
const btn=document.getElementById('send-btn')
let loading=false

input.addEventListener('input',()=>{
  if(!loading && input.value.trim()) { btn.className='active'; btn.textContent='SEND →' }
  else if(!loading) { btn.className='inactive'; btn.textContent='SEND →' }
})
input.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); send() }
})

function setSuggestion(q){ input.value=q; btn.className='active'; input.focus() }

function setLoading(v){
  loading=v
  input.disabled=v
  btn.className=v?'inactive':'active'
  btn.textContent=v?'···':'SEND →'
}

// ── Messages ──
const msgs=document.getElementById('messages')
const empty=document.getElementById('empty-state')

function addUserMsg(text){
  empty.style.display='none'
  const d=document.createElement('div')
  d.className='user-msg'
  d.innerHTML=`<div class="user-bubble">${escHtml(text)}</div>`
  msgs.appendChild(d)
  scrollBottom()
}

function addLoading(){
  const d=document.createElement('div')
  d.id='loading-msg'
  d.className='loading-wrap'
  let inner=`<div class="loading-crew">`
  MODELS.forEach((m,i)=>{
    inner+=`<div style="display:flex;flex-direction:column;align-items:center;gap:6px">
      <div style="animation:amBounce 0.65s ease-in-out ${i*0.13}s infinite alternate">${crewmateSVG(m.color,m.dark,34)}</div>
      <div style="width:5px;height:5px;border-radius:50%;background:${m.color};box-shadow:0 0 8px ${m.color};animation:amBlink 0.65s ease-in-out ${i*0.13}s infinite alternate"></div>
    </div>`
  })
  inner+=`</div><div class="loading-label">CREW IS DEBATING...</div>`
  d.innerHTML=inner
  msgs.appendChild(d)
  scrollBottom()
}

function removeLoading(){
  const l=document.getElementById('loading-msg')
  if(l) l.remove()
}

function addError(text){
  const d=document.createElement('div')
  d.className='error-msg'
  d.textContent='⚠ '+text
  msgs.appendChild(d)
  scrollBottom()
}

function addAIResponse(data){
  const wrap=document.createElement('div')
  wrap.className='ai-wrap'

  // Divider
  wrap.innerHTML=`<div class="divider"><div class="divider-line"></div>🚨 EMERGENCY MEETING CONCLUDED<div class="divider-line"></div></div>`

  // FINAL CONSENSUS ANSWER (Always visible)
  const finalCard=document.createElement('div')
  finalCard.className='winner-card consensus-card'
  
  // Build contributor icons
  let contributorIcons = ''
  if(data.top_contributors && data.top_contributors.length > 0){
    contributorIcons = data.top_contributors.map(name => {
      const model = MODELS.find(m => m.name === name) || MODELS[0]
      return `<div style="filter:drop-shadow(0 0 6px ${model.color}80);margin-right:-8px;">${crewmateSVG(model.color, model.dark, 36)}</div>`
    }).join('')
  } else {
    contributorIcons = crewmateSVG(MODELS[0].color, MODELS[0].dark, 40)
  }
  
  finalCard.innerHTML=`
    <div class="best-badge" style="background:#C5FF2A;color:#080B14;">★ CREW CONSENSUS</div>
    <div class="winner-header">
      <div style="display:flex;align-items:center;margin-right:10px;">
        ${contributorIcons}
      </div>
      <div class="winner-info">
        <div class="model-name" style="color:#C5FF2A;font-size:16px;">Collaborative Answer</div>
        <div class="model-role">${data.total_rounds || 2} rounds of debate · Top contributors: ${(data.top_contributors || []).join(', ') || 'All crewmates'}</div>
      </div>
    </div>
    <div class="answer-text" style="font-size:15px;line-height:1.85;">${escHtml(data.final_answer || data.responses?.[data.winner]?.answer || 'No answer generated')}</div>
    ${data.debate_summary ? `<div class="judge-reason" style="border-top:1px solid rgba(197,255,42,0.2);color:rgba(197,255,42,0.6);">📊 Debate Analysis: ${escHtml(data.debate_summary)}</div>` : ''}
  `
  wrap.appendChild(finalCard)

  // DEBATE LOG TOGGLE BUTTON
  const debateToggle=document.createElement('button')
  debateToggle.className='toggle-btn'
  debateToggle.style.cssText=`border-color:rgba(255,255,255,0.15);color:rgba(255,255,255,0.5);margin-bottom:8px;`
  debateToggle.innerHTML=`📜 VIEW FULL DEBATE LOG <span style="opacity:.5">(${data.total_rounds || 2} rounds)</span>`
  
  // DEBATE LOG CONTAINER (hidden by default)
  const debateDiv=document.createElement('div')
  debateDiv.className='others-wrap'
  debateDiv.style.display='none'
  
  // Build debate rounds
  if(data.debate_log && data.debate_log.length > 0){
    data.debate_log.forEach((round) => {
      const roundCard=document.createElement('div')
      roundCard.className='debate-round'
      
      let roundHTML=`<div class="debate-title">${round.title || `Round ${round.round}`}</div>`
      
      round.responses.forEach(r => {
        const model = MODELS.find(m => m.name === r.model_name) || MODELS[0]
        const isReply = r.responding_to ? true : false
        
        roundHTML+=`
          <div class="debate-message" style="border-left-color:${model.color};background:${model.color}08;">
            <div class="debate-header">
              <div style="filter:drop-shadow(0 0 4px ${model.color}60);">${crewmateSVG(model.color, model.dark, 32)}</div>
              <div>
                <div class="debate-name" style="color:${model.color};">${r.model_name}</div>
                <div class="debate-role">${r.role}</div>
              </div>
              ${isReply ? 
                `<span class="debate-badge">💬 Replying to others</span>` : 
                `<span class="debate-badge">🎤 Opening</span>`
              }
            </div>
            ${isReply && r.responding_to ? 
              `<div class="debate-context"><strong style="color:rgba(255,255,255,0.5);">Seeing crewmates' thoughts:</strong> ${escHtml(r.responding_to.substring(0, 200))}${r.responding_to.length > 200 ? '...' : ''}</div>` 
              : ''
            }
            <div class="debate-text">${escHtml(r.response)}</div>
          </div>
        `
      })
      
      roundCard.innerHTML=roundHTML
      debateDiv.appendChild(roundCard)
    })
  }
  
  // Toggle functionality
  let debateExpanded=false
  debateToggle.onclick=()=>{
    debateExpanded=!debateExpanded
    debateDiv.style.display=debateExpanded?'flex':'none'
    debateToggle.innerHTML=(debateExpanded?'📜 HIDE':'📜 VIEW')+` FULL DEBATE LOG <span style="opacity:.5">(${data.total_rounds || 2} rounds)</span>`
    debateToggle.style.background=debateExpanded?'rgba(255,255,255,0.06)':'none'
    debateToggle.style.color=debateExpanded?'rgba(255,255,255,0.7)':'rgba(255,255,255,0.5)'
    if(debateExpanded) setTimeout(scrollBottom, 100)
  }
  
  wrap.appendChild(debateToggle)
  wrap.appendChild(debateDiv)

  // INDIVIDUAL FINAL RESPONSES TOGGLE
  const finalToggle=document.createElement('button')
  finalToggle.className='toggle-btn'
  finalToggle.innerHTML=`▼ SEE FINAL INDIVIDUAL POSITIONS <span style="opacity:.5">(${MODELS.length})</span>`
  let finalExpanded=false
  const finalDiv=document.createElement('div')
  finalDiv.className='others-wrap'
  finalDiv.style.display='none'
  
  // Get last round responses or fallback to responses array
  const lastRound = data.debate_log?.[data.debate_log.length - 1]
  const finalResponses = lastRound?.responses || data.responses || []
  
  finalResponses.forEach((r, idx)=>{
    const model = MODELS.find(m => m.name === r.model_name) || MODELS[idx] || MODELS[0]
    const score = data.scores?.[idx] || 75
    
    const card=document.createElement('div')
    card.className='other-card'
    card.style.cssText=`border:1px solid ${model.color}30;background:${model.color}06`
    card.innerHTML=`
      <div class="other-header">
        ${crewmateSVG(model.color, model.dark, 34)}
        <div style="flex:1">
          <div style="color:${model.color};font-weight:700;font-size:12px;letter-spacing:1.2px;margin-bottom:4px">${model.name}</div>
          <div style="font-size:10px;color:rgba(255,255,255,0.4);margin-bottom:6px">${model.role}</div>
          ${scoreBarHTML(score, model.color)}
        </div>
      </div>
      <div class="other-answer">${escHtml(r.response || r.answer)}</div>
    `
    finalDiv.appendChild(card)
  })
  
  finalToggle.onclick=()=>{
    finalExpanded=!finalExpanded
    finalDiv.style.display=finalExpanded?'flex':'none'
    finalToggle.innerHTML=(finalExpanded?'▲ HIDE':'▼ SEE')+` FINAL INDIVIDUAL POSITIONS <span style="opacity:.5">(${MODELS.length})</span>`
    finalToggle.style.background=finalExpanded?'rgba(255,255,255,0.04)':'none'
    if(finalExpanded) setTimeout(scrollBottom, 100)
  }
  
  wrap.appendChild(finalToggle)
  wrap.appendChild(finalDiv)

  msgs.appendChild(wrap)
  animateScores()
  scrollBottom()
}

function scrollBottom(){ setTimeout(()=>window.scrollTo({top:document.body.scrollHeight,behavior:'smooth'}),50) }
function escHtml(t){ const d=document.createElement('div'); d.textContent=t; return d.innerHTML }

// ── Send ──
async function send(){
  const q=input.value.trim()
  if(!q||loading) return
  input.value=''
  btn.className='inactive'
  setLoading(true)
  addUserMsg(q)
  addLoading()
  try{
    const res=await fetch('/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({question:q})
    })
    if(!res.ok) throw new Error(`Server error ${res.status}`)
    const data=await res.json()
    removeLoading()
    addAIResponse(data)
  } catch(err){
    removeLoading()
    addError(err.message)
  }
  setLoading(false)
}
</script>
